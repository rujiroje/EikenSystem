server:
  port: 8090
  servlet:
    context-path: /

spring:
  datasource:
    # Parameterize for flexibility; override with environment variables
    url: jdbc:sqlserver://${DB_HOST:localhost}:${DB_PORT:1433};databaseName=${DB_NAME:EikenDB};encrypt=false;trustServerCertificate=true
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:YourStrong!Passw0rd}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.SQLServerDialect
  jackson:
    serialization:
      INDENT_OUTPUT: true

# CORS (ปรับตามต้นทาง front-end dev)
app:
  cors:
    allowed-origins: "http://localhost:5173"
  jwt:
    # ขยายอายุ token เป็น 12 ชั่วโมง (ค่าเดิม 8 ชั่วโมง)
    ttlSeconds: 43200
  webauthn:
    # rpId ต้องตรงกับ domain ที่ Browser เข้าถึง (dev=localhost, prod=IP/domain จริง)
    rp-id: localhost
    rp-name: Eikensystem
    # origins ที่อนุญาต — คั่นด้วย comma ถ้ามีหลาย origin
    origins: "http://localhost:5173"

