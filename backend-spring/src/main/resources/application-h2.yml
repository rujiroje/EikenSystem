spring:
  config:
    activate:
      on-profile: h2

  datasource:
    url: jdbc:h2:mem:eiken;MODE=MSSQLServer;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

# H2 web console (optional)
spring.h2.console.enabled: true
spring.h2.console.path: /h2-console

server:
  port: 8081
  servlet:
    context-path: /

app:
  cors:
    allowed-origins: "http://localhost:5173"
