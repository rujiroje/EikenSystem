version: '3.9'
services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: eiken-mssql
    ports:
      - "1433:1433"
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${DB_PASS:-YourStrong!Passw0rd}"
      MSSQL_PID: "Developer"
    volumes:
      - mssql-data:/var/opt/mssql

  nginx:
    image: nginx:1.27-alpine
    container_name: eiken-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # nginx config
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # SSL certificate (สร้างด้วย generate-ssl.bat / generate-ssl.sh ก่อน)
      - ./nginx/ssl:/etc/nginx/ssl:ro
      # Frontend static files (npm run build ก่อน)
      - ./frontend/dist:/usr/share/nginx/html:ro
    # nginx ต้องเห็น backend ที่รันบน host
    extra_hosts:
      - "localhost:host-gateway"
    restart: unless-stopped

volumes:
  mssql-data:
